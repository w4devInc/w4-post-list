name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.2"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: w4pl_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, gd
          coverage: none

      - name: Install dev dependencies
        run: COMPOSER=composer-dev.json composer install --no-interaction --no-progress

      - name: Run test suite
        run: vendor-dev/bin/phpunit
        env:
          WP_TESTS_DB_HOST: 127.0.0.1
          WP_TESTS_DB_USER: root
          WP_TESTS_DB_PASSWORD: root
          WP_TESTS_DB_NAME: w4pl_tests

  phpcs:
    name: Coding standards (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dev dependencies
        run: COMPOSER=composer-dev.json composer install --no-interaction --no-progress

      - name: Run phpcs
        run: vendor-dev/bin/phpcs --standard=phpcs.xml --report=summary .
